<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game with AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Press Start 2P', cursive;
        }
    </style>
</head>
<body>
    <div id="controls" style="position: absolute; top: 10px; left: 50%; transform: translateX(-50%); text-align: center;">
        <label for="playerName">Your Name: </label>
        <input type="text" id="playerName" placeholder="Enter your name" style="margin-right: 10px;">
        <label for="aiSkill">AI Skill Level: </label>
        <select id="aiSkill">
            <option value="0.4">Easy</option>
            <option value="0.7" selected>Medium</option>
            <option value="1">Hard</option>
        </select>
        <button id="startBtn" style="margin-left:20px;">Start Game</button>
        <button id="fullscreenBtn" style="margin-left:20px;">Fullscreen</button>
        <button id="changeBgBtn" style="margin-left:20px;">Change Background</button>
        <select id="bgOptions" style="display: none; margin-left: 10px;">
            <option value="gradient">Gradient</option>
            <option value="space">Space</option>
            <option value="forest">Forest</option>
        </select>
    </div>
    <canvas id="pongCanvas" width="800" height="600"></canvas>
    <script src="game.js"></script>
</body>
</html>
